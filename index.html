<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - CIC Consultoría</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6perkQ9d4LaC4DwABXozl0HI87gFJrdA",
            authDomain: "cic-consultoria---admin.firebaseapp.com",
            projectId: "cic-consultoria---admin",
            storageBucket: "cic-consultoria---admin.firebasestorage.app",
            messagingSenderId: "418942590121",
            appId: "1:418942590121:web:3f42a2e5e426bfa9061db8",
            measurementId: "G-5443VZJ6V0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseSignIn = signInWithEmailAndPassword;
        window.firebaseSignOut = signOut;
        window.firebaseOnAuth = onAuthStateChanged;
        window.firebaseCollection = collection;
        window.firebaseAddDoc = addDoc;
        window.firebaseUpdateDoc = updateDoc;
        window.firebaseDeleteDoc = deleteDoc;
        window.firebaseDoc = doc;
        window.firebaseOnSnapshot = onSnapshot;
        window.firebaseQuery = query;
        window.firebaseOrderBy = orderBy;
        window.firebaseTimestamp = Timestamp;

        // Escuchar todas las colecciones
        const collections = ['cursos', 'blogs', 'inscripciones', 'pagos', 'gastos'];
        collections.forEach(col => {
            const ref = collection(db, col);
            const q = query(ref, orderBy("fecha" in col ? "fecha" : "createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                window[col + 'Data'] = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (col === 'cursos' && typeof window.renderHistorialCursos === 'function') window.renderHistorialCursos();
                if (col === 'blogs' && typeof window.renderHistorialBlogs === 'function') window.renderHistorialBlogs();
                if (col === 'pagos' && typeof window.renderPagos === 'function') window.renderPagos();
                if (col === 'gastos' && typeof window.renderGastos === 'function') window.renderGastos();
                if (typeof window.updateKPIs === 'function') window.updateKPIs();
            });
        });

        onAuthStateChanged(auth, (user) => {
            window.currentUser = user;
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('admin-email').textContent = user.email;
            }
        });
    </script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { cic: { primary: '#5E1B96', secondary: '#7B3FA8', accent: '#9B5FD9' } }, fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { background: #f3f4f6; }
        .gradient-header { background: linear-gradient(135deg, #5E1B96 0%, #7B3FA8 100%); }
        .tab-active { border-bottom: 3px solid #5E1B96; color: #5E1B96; font-weight: 600; }
        .kpi-card { background: linear-gradient(135deg, #5E1B96 0%, #7B3FA8 100%); }
    </style>
</head>
<body>

    <!-- Login -->
    <div id="login-section" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
            <div class="text-center mb-6">
                <img src="logo-cic.png" alt="CIC" class="h-16 mx-auto mb-4">
                <h2 class="font-heading text-2xl font-bold text-cic-primary">Panel de Administración</h2>
            </div>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Correo electrónico" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                <input type="password" id="loginPassword" placeholder="Contraseña" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                <button type="submit" class="w-full bg-gradient-to-r from-cic-primary to-cic-secondary text-white font-bold py-3 rounded-xl hover:shadow-lg transition">Ingresar</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-section" class="hidden min-h-screen">
        <!-- Header -->
        <div class="gradient-header text-white shadow-lg sticky top-0 z-10">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="logo-cic-blanco.png" alt="CIC" class="h-10">
                    <span class="font-heading font-bold text-lg">Panel de Administración</span>
                    <span class="bg-white/20 px-3 py-1 rounded-full text-xs" id="admin-email"></span>
                </div>
                <button onclick="window.firebaseSignOut(window.firebaseAuth)" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm font-medium transition">
                    <i class="fas fa-sign-out-alt mr-2"></i>Cerrar sesión
                </button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4 py-8">
            <!-- Tabs principales -->
            <div class="flex gap-2 mb-6 border-b border-gray-300 flex-wrap">
                <button onclick="showTab('dashboard')" id="tab-dashboard" class="tab-active px-6 py-3 font-medium">📊 Dashboard</button>
                <button onclick="showTab('cursos')" id="tab-cursos" class="px-6 py-3 font-medium text-gray-600">📚 Cursos</button>
                <button onclick="showTab('blogs')" id="tab-blogs" class="px-6 py-3 font-medium text-gray-600">📝 Blogs</button>
                <button onclick="showTab('admin')" id="tab-admin" class="px-6 py-3 font-medium text-gray-600"> Gestión Administrativa</button>
            </div>

            <!-- Dashboard -->
            <div id="panel-dashboard" class="space-y-6">
                <div class="grid md:grid-cols-4 gap-6">
                    <div class="kpi-card text-white rounded-2xl p-6 shadow-lg">
                        <div class="flex items-center justify-between mb-2">
                            <i class="fas fa-users text-3xl"></i>
                            <span class="text-purple-200 text-sm">Inscripciones</span>
                        </div>
                        <p class="text-4xl font-bold" id="kpi-inscripciones">0</p>
                    </div>
                    <div class="bg-gradient-to-br from-green-500 to-green-600 text-white rounded-2xl p-6 shadow-lg">
                        <div class="flex items-center justify-between mb-2">
                            <i class="fas fa-dollar-sign text-3xl"></i>
                            <span class="text-green-200 text-sm">Ingresos</span>
                        </div>
                        <p class="text-4xl font-bold" id="kpi-ingresos">$0</p>
                    </div>
                    <div class="bg-gradient-to-br from-red-500 to-red-600 text-white rounded-2xl p-6 shadow-lg">
                        <div class="flex items-center justify-between mb-2">
                            <i class="fas fa-credit-card text-3xl"></i>
                            <span class="text-red-200 text-sm">Gastos</span>
                        </div>
                        <p class="text-4xl font-bold" id="kpi-gastos">$0</p>
                    </div>
                    <div class="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-2xl p-6 shadow-lg">
                        <div class="flex items-center justify-between mb-2">
                            <i class="fas fa-chart-line text-3xl"></i>
                            <span class="text-blue-200 text-sm">Balance</span>
                        </div>
                        <p class="text-4xl font-bold" id="kpi-balance">$0</p>
                    </div>
                </div>
            </div>

            <!-- Cursos -->
            <div id="panel-cursos" class="hidden">
                <div class="flex gap-2 mb-6">
                    <button onclick="showCursosSubtab('crear')" id="cursos-subtab-crear" class="tab-active px-6 py-3 font-medium">➕ Crear Curso</button>
                    <button onclick="showCursosSubtab('lista')" id="cursos-subtab-lista" class="px-6 py-3 font-medium text-gray-600">📋 Lista de Cursos</button>
                </div>
                
                <div id="cursos-crear" class="bg-white rounded-2xl shadow-lg p-8">
                    <h2 class="font-heading text-2xl font-bold text-cic-primary mb-6">Crear/Editar Curso</h2>
                    <form id="cursoForm" class="space-y-6">
                        <input type="hidden" id="cursoId">
                        <div class="grid md:grid-cols-2 gap-6">
                            <input type="text" id="cursoTitulo" placeholder="Título del curso" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <select id="cursoInstructor" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                                <option value="Cici">🦝 Cici</option>
                                <option value="Coco"> Coco</option>
                            </select>
                        </div>
                        <div class="grid md:grid-cols-3 gap-6">
                            <input type="number" id="cursoPrecio" placeholder="Precio (MXN)" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <input type="date" id="cursoFecha" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <input type="text" id="cursoHorario" placeholder="Horario" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                        </div>
                        <textarea id="cursoDescripcion" placeholder="Descripción" required rows="3" class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none"></textarea>
                        <select id="cursoEstado" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <option value="Programado">📅 Programado</option>
                            <option value="En curso">🟡 En curso</option>
                            <option value="Finalizado">✅ Finalizado</option>
                        </select>
                        <button type="submit" class="w-full bg-gradient-to-r from-cic-primary to-cic-secondary text-white font-bold py-4 rounded-xl hover:shadow-lg transition">💾 Guardar Curso</button>
                    </form>
                </div>

                <div id="cursos-lista" class="hidden bg-white rounded-2xl shadow-lg p-8">
                    <h2 class="font-heading text-2xl font-bold text-cic-primary mb-6">Cursos Registrados</h2>
                    <div id="cursos-container" class="space-y-4"></div>
                </div>
            </div>

            <!-- Blogs -->
            <div id="panel-blogs" class="hidden">
                <div class="flex gap-2 mb-6">
                    <button onclick="showBlogsSubtab('crear')" id="blogs-subtab-crear" class="tab-active px-6 py-3 font-medium">➕ Crear Blog</button>
                    <button onclick="showBlogsSubtab('lista')" id="blogs-subtab-lista" class="px-6 py-3 font-medium text-gray-600">📋 Lista de Blogs</button>
                </div>
                
                <div id="blogs-crear" class="bg-white rounded-2xl shadow-lg p-8">
                    <h2 class="font-heading text-2xl font-bold text-cic-primary mb-6">Crear/Editar Artículo</h2>
                    <form id="blogForm" class="space-y-6">
                        <input type="hidden" id="blogId">
                        <input type="text" id="blogTitulo" placeholder="Título del artículo" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                        <input type="text" id="blogCategoria" placeholder="Categoría" class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                        <textarea id="blogResumen" placeholder="Resumen" rows="2" class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none"></textarea>
                        <textarea id="blogContenido" placeholder="Contenido completo" required rows="8" class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none"></textarea>
                        <input type="url" id="blogImagen" placeholder="URL de imagen (opcional)" class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                        <button type="submit" class="w-full bg-gradient-to-r from-cic-primary to-cic-secondary text-white font-bold py-4 rounded-xl hover:shadow-lg transition">💾 Publicar Artículo</button>
                    </form>
                </div>

                <div id="blogs-lista" class="hidden bg-white rounded-2xl shadow-lg p-8">
                    <h2 class="font-heading text-2xl font-bold text-cic-primary mb-6">Artículos Publicados</h2>
                    <div id="blogs-container" class="space-y-4"></div>
                </div>
            </div>

            <!-- Gestión Administrativa -->
            <div id="panel-admin" class="hidden">
                <div class="flex gap-2 mb-6">
                    <button onclick="showAdminSubtab('pagos')" id="admin-subtab-pagos" class="tab-active px-6 py-3 font-medium">💵 Pagos</button>
                    <button onclick="showAdminSubtab('gastos')" id="admin-subtab-gastos" class="px-6 py-3 font-medium text-gray-600">💸 Gastos</button>
                </div>
                
                <div id="admin-pagos" class="space-y-6">
                    <div class="bg-white rounded-2xl shadow-lg p-8">
                        <h2 class="font-heading text-2xl font-bold text-cic-primary mb-6">Registrar Pago</h2>
                        <form id="pagoForm" class="space-y-6">
                            <input type="text" id="pagoCliente" placeholder="Nombre del cliente" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <input type="number" id="pagoMonto" placeholder="Monto (MXN)" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <input type="text" id="pagoConcepto" placeholder="Concepto" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <input type="date" id="pagoFecha" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <button type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:shadow-lg transition"> Registrar Pago</button>
                        </form>
                    </div>
                    <div class="bg-white rounded-2xl shadow-lg p-8">
                        <h3 class="font-heading text-xl font-bold text-cic-primary mb-6">Historial de Pagos</h3>
                        <div id="pagos-container" class="space-y-4"></div>
                    </div>
                </div>

                <div id="admin-gastos" class="hidden space-y-6">
                    <div class="bg-white rounded-2xl shadow-lg p-8">
                        <h2 class="font-heading text-2xl font-bold text-cic-primary mb-6">Registrar Gasto</h2>
                        <form id="gastoForm" class="space-y-6">
                            <input type="text" id="gastoConcepto" placeholder="Concepto del gasto" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <input type="number" id="gastoMonto" placeholder="Monto (MXN)" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <select id="gastoCategoria" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                                <option>Infraestructura</option>
                                <option>Marketing</option>
                                <option>Servicios</option>
                                <option>Oficina</option>
                                <option>Impuestos</option>
                                <option>Otros</option>
                            </select>
                            <input type="date" id="gastoFecha" required class="w-full px-4 py-3 rounded-xl border-2 border-purple-200 focus:border-cic-secondary outline-none">
                            <button type="submit" class="w-full bg-red-600 text-white font-bold py-4 rounded-xl hover:shadow-lg transition">💾 Registrar Gasto</button>
                        </form>
                    </div>
                    <div class="bg-white rounded-2xl shadow-lg p-8">
                        <h3 class="font-heading text-xl font-bold text-cic-primary mb-6">Historial de Gastos</h3>
                        <div id="gastos-container" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tabs
        function showTab(tab) {
            ['dashboard', 'cursos', 'blogs', 'admin'].forEach(t => {
                document.getElementById('panel-' + t).classList.toggle('hidden', t !== tab);
                document.getElementById('tab-' + t).className = t === tab ? 'tab-active px-6 py-3 font-medium' : 'px-6 py-3 font-medium text-gray-600';
            });
            if (tab === 'dashboard') updateKPIs();
        }

        function showCursosSubtab(tab) {
            document.getElementById('cursos-crear').classList.toggle('hidden', tab !== 'crear');
            document.getElementById('cursos-lista').classList.toggle('hidden', tab !== 'lista');
            document.getElementById('cursos-subtab-crear').className = tab === 'crear' ? 'tab-active px-6 py-3 font-medium' : 'px-6 py-3 font-medium text-gray-600';
            document.getElementById('cursos-subtab-lista').className = tab === 'lista' ? 'tab-active px-6 py-3 font-medium' : 'px-6 py-3 font-medium text-gray-600';
        }

        function showBlogsSubtab(tab) {
            document.getElementById('blogs-crear').classList.toggle('hidden', tab !== 'crear');
            document.getElementById('blogs-lista').classList.toggle('hidden', tab !== 'lista');
            document.getElementById('blogs-subtab-crear').className = tab === 'crear' ? 'tab-active px-6 py-3 font-medium' : 'px-6 py-3 font-medium text-gray-600';
            document.getElementById('blogs-subtab-lista').className = tab === 'lista' ? 'tab-active px-6 py-3 font-medium' : 'px-6 py-3 font-medium text-gray-600';
        }

        function showAdminSubtab(tab) {
            document.getElementById('admin-pagos').classList.toggle('hidden', tab !== 'pagos');
            document.getElementById('admin-gastos').classList.toggle('hidden', tab !== 'gastos');
            document.getElementById('admin-subtab-pagos').className = tab === 'pagos' ? 'tab-active px-6 py-3 font-medium' : 'px-6 py-3 font-medium text-gray-600';
            document.getElementById('admin-subtab-gastos').className = tab === 'gastos' ? 'tab-active px-6 py-3 font-medium' : 'px-6 py-3 font-medium text-gray-600';
        }

        // Login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                await window.firebaseSignIn(window.firebaseAuth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        // Cursos
        document.getElementById('cursoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('cursoId').value;
            const data = {
                titulo: document.getElementById('cursoTitulo').value,
                instructor: document.getElementById('cursoInstructor').value,
                precio: parseFloat(document.getElementById('cursoPrecio').value),
                fecha: document.getElementById('cursoFecha').value,
                horario: document.getElementById('cursoHorario').value,
                descripcion: document.getElementById('cursoDescripcion').value,
                estado: document.getElementById('cursoEstado').value,
                updatedAt: new Date().toISOString()
            };
            
            try {
                if (id) {
                    await window.firebaseUpdateDoc(window.firebaseDoc(window.firebaseDb, "cursos", id), data);
                } else {
                    data.createdAt = new Date().toISOString();
                    await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDb, "cursos"), data);
                }
                alert('✅ Curso guardado');
                this.reset();
                document.getElementById('cursoId').value = '';
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        });

        function renderHistorialCursos() {
            const container = document.getElementById('cursos-container');
            const cursos = window.cursosData || [];
            container.innerHTML = cursos.map(c => `
                <div class="border-2 border-purple-100 rounded-xl p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-cic-primary">${c.titulo}</h3>
                            <p class="text-sm text-gray-600">${c.instructor} · $${c.precio} · ${c.fecha}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editarCurso('${c.id}')" class="bg-blue-500 text-white px-3 py-1 rounded-lg text-sm">✏️</button>
                            <button onclick="eliminarCurso('${c.id}')" class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function editarCurso(id) {
            const curso = window.cursosData.find(c => c.id === id);
            if (curso) {
                document.getElementById('cursoId').value = curso.id;
                document.getElementById('cursoTitulo').value = curso.titulo;
                document.getElementById('cursoInstructor').value = curso.instructor;
                document.getElementById('cursoPrecio').value = curso.precio;
                document.getElementById('cursoFecha').value = curso.fecha;
                document.getElementById('cursoHorario').value = curso.horario;
                document.getElementById('cursoDescripcion').value = curso.descripcion;
                document.getElementById('cursoEstado').value = curso.estado;
                showCursosSubtab('crear');
            }
        }

        async function eliminarCurso(id) {
            if (confirm('¿Eliminar curso?')) {
                await window.firebaseDeleteDoc(window.firebaseDoc(window.firebaseDb, "cursos", id));
            }
        }

        // Blogs
        document.getElementById('blogForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('blogId').value;
            const data = {
                titulo: document.getElementById('blogTitulo').value,
                categoria: document.getElementById('blogCategoria').value,
                resumen: document.getElementById('blogResumen').value,
                contenido: document.getElementById('blogContenido').value,
                imagen: document.getElementById('blogImagen').value,
                fechaPublicacion: new Date().toISOString()
            };
            
            try {
                if (id) {
                    await window.firebaseUpdateDoc(window.firebaseDoc(window.firebaseDb, "blogs", id), data);
                } else {
                    await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDb, "blogs"), data);
                }
                alert('✅ Artículo publicado');
                this.reset();
                document.getElementById('blogId').value = '';
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        });

        function renderHistorialBlogs() {
            const container = document.getElementById('blogs-container');
            const blogs = window.blogsData || [];
            container.innerHTML = blogs.map(b => `
                <div class="border-2 border-purple-100 rounded-xl p-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-cic-primary">${b.titulo}</h3>
                            <p class="text-sm text-gray-600">${b.categoria} · ${new Date(b.fechaPublicacion).toLocaleDateString()}</p>
                        </div>
                        <button onclick="eliminarBlog('${b.id}')" class="bg-red-500 text-white px-3 py-1 rounded-lg text-sm">️</button>
                    </div>
                </div>
            `).join('');
        }

        async function eliminarBlog(id) {
            if (confirm('¿Eliminar artículo?')) {
                await window.firebaseDeleteDoc(window.firebaseDoc(window.firebaseDb, "blogs", id));
            }
        }

        // Pagos y Gastos
        document.getElementById('pagoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDb, "pagos"), {
                cliente: document.getElementById('pagoCliente').value,
                monto: parseFloat(document.getElementById('pagoMonto').value),
                concepto: document.getElementById('pagoConcepto').value,
                fecha: document.getElementById('pagoFecha').value,
                createdAt: window.firebaseTimestamp.now()
            });
            alert('✅ Pago registrado');
            this.reset();
            document.getElementById('pagoFecha').value = new Date().toISOString().split('T')[0];
        });

        document.getElementById('gastoForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            await window.firebaseAddDoc(window.firebaseCollection(window.firebaseDb, "gastos"), {
                concepto: document.getElementById('gastoConcepto').value,
                monto: parseFloat(document.getElementById('gastoMonto').value),
                categoria: document.getElementById('gastoCategoria').value,
                fecha: document.getElementById('gastoFecha').value,
                createdAt: window.firebaseTimestamp.now()
            });
            alert('✅ Gasto registrado');
            this.reset();
            document.getElementById('gastoFecha').value = new Date().toISOString().split('T')[0];
        });

        function renderPagos() {
            const container = document.getElementById('pagos-container');
            const pagos = window.pagosData || [];
            container.innerHTML = pagos.map(p => `
                <div class="bg-green-50 border-2 border-green-200 rounded-xl p-4">
                    <div class="flex justify-between">
                        <div>
                            <p class="font-bold text-green-800">${p.cliente}</p>
                            <p class="text-sm text-green-700">${p.concepto}</p>
                        </div>
                        <span class="text-green-600 font-bold">$${p.monto.toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderGastos() {
            const container = document.getElementById('gastos-container');
            const gastos = window.gastosData || [];
            container.innerHTML = gastos.map(g => `
                <div class="bg-red-50 border-2 border-red-200 rounded-xl p-4">
                    <div class="flex justify-between">
                        <div>
                            <p class="font-bold text-red-800">${g.concepto}</p>
                            <p class="text-sm text-red-700">${g.categoria}</p>
                        </div>
                        <span class="text-red-600 font-bold">$${g.monto.toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }

        // KPIs
        function updateKPIs() {
            const inscripciones = window.inscripcionesData || [];
            const pagos = window.pagosData || [];
            const gastos = window.gastosData || [];
            
            document.getElementById('kpi-inscripciones').textContent = inscripciones.length;
            document.getElementById('kpi-ingresos').textContent = '$' + pagos.reduce((s, p) => s + p.monto, 0).toLocaleString();
            document.getElementById('kpi-gastos').textContent = '$' + gastos.reduce((s, g) => s + g.monto, 0).toLocaleString();
            document.getElementById('kpi-balance').textContent = '$' + (pagos.reduce((s, p) => s + p.monto, 0) - gastos.reduce((s, g) => s + g.monto, 0)).toLocaleString();
        }
    </script>
</body>
</html>
